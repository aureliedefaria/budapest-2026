
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#C41230">
  <title>Budapest 2026 🇭🇺</title>
  <style>
    :root {
      --red: #C41230;
      --red-light: #f8e8eb;
      --green: #2A5C34;
      --gold: #C8922A;
      --bg: #F7F4EF;
      --card: #fff;
      --text: #1a1a1a;
      --muted: #888;
      --border: #ede8e0;
      --nav-h: 64px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    /* ── APP SHELL ── */
    #app { display: flex; flex-direction: column; height: 100dvh; }

    .screen {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: none;
      padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 8px);
    }
    .screen.active { display: block; }

    /* ── ONBOARDING ── */
    #onboarding {
      position: fixed; inset: 0; z-index: 999;
      background: linear-gradient(160deg, #1a0810 0%, #4a1020 45%, #152a18 100%);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 24px; padding: 32px;
      text-align: center; color: white;
    }
    #onboarding h1 { font-size: 36px; font-weight: 200; letter-spacing: 0.15em; text-transform: uppercase; }
    #onboarding p { font-size: 15px; opacity: 0.7; }
    #onboarding .flag { font-size: 56px; }
    .person-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
    .person-btn {
      padding: 16px; border-radius: 50px; border: 1.5px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.08); color: white;
      font-size: 16px; font-weight: 500; cursor: pointer;
      transition: all 0.2s;
    }
    .person-btn:hover, .person-btn:active { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.6); }
    #onboarding.hidden { display: none; }

    /* ── HEADER ── */
    .app-header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .app-header h2 { font-size: 17px; font-weight: 700; }
    .app-header .sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .avatar-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--red); color: white;
      font-size: 13px; font-weight: 700;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + var(--safe-bottom));
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex; align-items: flex-start;
      padding-top: 6px;
      z-index: 100;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 3px; background: none; border: none; cursor: pointer;
      padding: 4px 0; color: var(--muted); font-size: 10.5px; font-weight: 500;
      transition: color 0.15s;
    }
    .nav-btn .icon { font-size: 22px; line-height: 1; transition: transform 0.15s; }
    .nav-btn.active { color: var(--red); }
    .nav-btn.active .icon { transform: scale(1.1); }

    /* ── SHARED COMPONENTS ── */
    .section-pad { padding: 16px; }
    .card {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden; margin-bottom: 14px;
    }
    .card-header {
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.09em;
      text-transform: uppercase; color: var(--muted);
      padding: 10px 14px; background: #fafaf8; border-bottom: 1px solid var(--border);
    }
    .row {
      display: flex; padding: 11px 14px; gap: 12px;
      border-bottom: 1px solid var(--border); align-items: flex-start;
    }
    .row:last-child { border-bottom: none; }
    .row-time {
      flex: 0 0 46px; font-size: 11.5px; color: var(--muted);
      padding-top: 2px; font-variant-numeric: tabular-nums; line-height: 1.4;
    }
    .row-body { flex: 1; min-width: 0; }
    .row-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; line-height: 1.35; }
    .row-name a {
      color: var(--text); text-decoration: none;
      border-bottom: 1.5px solid var(--gold); padding-bottom: 1px;
    }
    .row-detail { font-size: 12px; color: var(--muted); line-height: 1.45; }
    .tags { display: inline-flex; gap: 4px; margin-left: 5px; vertical-align: middle; }
    .tag { font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 6px; border-radius: 7px; }
    .tag-dinner { background: #fff0f2; color: #c41230; }
    .tag-lunch  { background: #fff8e8; color: #9a6100; }
    .tag-baths  { background: #eaf4ff; color: #1255a0; }
    .tag-book   { background: #edfbf2; color: #2a5c34; border: 1px solid #a8d5b5; }
    .pill {
      display: inline-block; background: var(--red); color: white;
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 3px 12px; border-radius: 20px;
    }

    /* ── TODAY SCREEN ── */
    .today-hero {
      background: linear-gradient(155deg, #1a0810 0%, #4a1020 50%, #152a18 100%);
      padding: 28px 20px 24px; color: white; text-align: center;
    }
    .today-date { font-size: 12px; opacity: 0.6; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
    .today-hero h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .today-theme { font-size: 13px; opacity: 0.7; font-style: italic; }
    .today-progress {
      display: flex; gap: 6px; justify-content: center; margin-top: 16px;
    }
    .progress-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.25);
    }
    .progress-dot.done { background: rgba(255,255,255,0.9); }
    .today-body { padding: 16px; }

    /* pre-trip / post-trip */
    .pretrip-card {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 24px 20px; text-align: center;
      margin-bottom: 14px;
    }
    .pretrip-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .pretrip-card p { font-size: 14px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
    .pretrip-card .countdown { font-size: 36px; font-weight: 200; color: var(--red); margin: 8px 0; }
    .cta-btn {
      display: inline-block; background: var(--red); color: white;
      padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: 600;
      border: none; cursor: pointer; text-decoration: none;
    }

    /* ── ITINERARY SCREEN ── */
    .day-tabs {
      display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; gap: 0;
      background: var(--card); border-bottom: 1px solid var(--border);
      position: sticky; top: 57px; z-index: 40;
    }
    .day-tabs::-webkit-scrollbar { display: none; }
    .day-tab {
      flex: 0 0 auto; padding: 11px 16px; font-size: 12.5px; font-weight: 500;
      color: var(--muted); border: none; background: none; cursor: pointer;
      border-bottom: 2.5px solid transparent; white-space: nowrap;
      transition: all 0.15s;
    }
    .day-tab.active { color: var(--red); border-bottom-color: var(--red); }
    .day-content { padding: 16px; display: none; }
    .day-content.active { display: block; }
    .day-intro { margin-bottom: 16px; }
    .day-intro h2 { font-size: 20px; font-weight: 700; margin: 6px 0 3px; }
    .day-intro p { font-size: 13px; color: var(--muted); font-style: italic; }

    /* ── PACKING SCREEN ── */
    .packing-header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 12px 16px; position: sticky; top: 57px; z-index: 40;
    }
    .packing-tabs {
      display: flex; gap: 8px;
    }
    .packing-tab {
      flex: 1; padding: 8px; border-radius: 10px; border: 1.5px solid var(--border);
      background: none; font-size: 13px; font-weight: 500; color: var(--muted);
      cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .packing-tab.active { border-color: var(--red); background: var(--red-light); color: var(--red); }
    .packing-progress {
      display: flex; align-items: center; gap: 8px;
      margin-top: 10px;
    }
    .progress-bar {
      flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.3s; }
    .progress-text { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .packing-body { padding: 16px; }
    .packing-section { margin-bottom: 8px; }
    .packing-section-title {
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
      padding: 6px 0; margin-bottom: 4px;
    }
    .packing-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .pack-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.1s;
    }
    .pack-item:last-child { border-bottom: none; }
    .pack-item:active { background: #f5f0ea; }
    .pack-item.checked .item-name { text-decoration: line-through; color: var(--muted); }
    .pack-checkbox {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .pack-item.checked .pack-checkbox { background: var(--green); border-color: var(--green); }
    .pack-checkbox::after { content: ''; display: none; }
    .pack-item.checked .pack-checkbox::after {
      display: block; width: 5px; height: 9px;
      border: 2px solid white; border-top: none; border-left: none;
      transform: rotate(42deg) translate(-1px, -1px);
    }
    .item-name { font-size: 14px; flex: 1; }
    .item-cat {
      font-size: 10px; color: var(--muted); background: var(--border);
      padding: 2px 7px; border-radius: 6px; flex-shrink: 0;
    }

    /* ── INFO SCREEN ── */
    .info-body { padding: 16px; }
    .info-card {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden; margin-bottom: 14px;
    }
    .info-card-header {
      padding: 14px 16px; font-size: 15px; font-weight: 700;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; cursor: pointer;
    }
    .info-card-body { padding: 14px 16px; display: none; }
    .info-card-body.open { display: block; }
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13.5px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .val { font-weight: 600; color: var(--red); }
    .phrase-row { padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; }
    .phrase-row:last-child { border-bottom: none; }
    .phrase-fr { font-weight: 600; margin-bottom: 2px; }
    .phrase-hu { color: var(--muted); font-style: italic; font-size: 13px; }
    .phrase-pron { font-size: 11.5px; color: #aaa; }
    .callout {
      background: #e8f4ff; border-radius: 10px; padding: 12px 14px;
      font-size: 13px; line-height: 1.6; margin-bottom: 8px; color: #1255a0;
    }
    .callout.green { background: #edfbf2; color: #2a5c34; }
  </style>
</head>

    <div class="packing-body" id="packing-body"></div>

  <!-- INFO SCREEN -->

    </button>
    <button class="nav-btn" id="nav-info" onclick="goTo('info')">
      <span class="icon">ℹ️</span><span>Infos</span>
    </button>
  </nav>
</div>

let currentPerson = null;
let currentScreen = 'today';
let currentPackSection = 'must';
let currentDayIndex = 0;

function getTodayDayIndex() {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  for (let i = 0; i < DAYS.length; i++) {
    const d = new Date(DAYS[i].date);
    if (today.getTime() === d.getTime()) return i;
  }
  return -1; // before or after trip
}

function getTripStatus() {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const start = new Date(TRIP_START.getFullYear(), TRIP_START.getMonth(), TRIP_START.getDate());
  const end   = new Date(TRIP_END.getFullYear(), TRIP_END.getMonth(), TRIP_END.getDate());
  if (today < start) return 'before';
  if (today > end)   return 'after';
  return 'during';
}

function getDaysUntil() {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const start = new Date(TRIP_START.getFullYear(), TRIP_START.getMonth(), TRIP_START.getDate());
  return Math.round((start - today) / (1000*60*60*24));
}

function setPerson(name) {
  currentPerson = name;
  localStorage.setItem('budapest_person', name);
  document.getElementById('onboarding').classList.add('hidden');
  document.getElementById('avatar-btn').textContent = name[0];
  renderAll();
}

function resetPerson() {
  if (confirm('Changer de personne ?')) {
    currentPerson = null;
    localStorage.removeItem('budapest_person');
    document.getElementById('onboarding').classList.remove('hidden');
    document.getElementById('avatar-btn').textContent = '?';
  }
}

function initPerson() {
  const saved = localStorage.getItem('budapest_person');
  if (saved) {
    currentPerson = saved;
    document.getElementById('onboarding').classList.add('hidden');
    document.getElementById('avatar-btn').textContent = saved[0];
  }
}

function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  document.getElementById('nav-' + screen).classList.add('active');
  currentScreen = screen;
  updateHeader(screen);
}

function updateHeader(screen) {
  const titles = { today: 'Budapest 🇭🇺', itinerary: 'Itinéraire', packing: 'Valise', info: 'Infos' };
  const subs   = { today: '20–24 avril 2026', itinerary: '5 jours · 4 nuits', packing: currentPerson ? `Checklist de ${currentPerson}` : 'Checklist', info: 'Transport · Phrases · Shopping' };
  document.getElementById('header-title').textContent = titles[screen] || 'Budapest 🇭🇺';
  document.getElementById('header-sub').textContent = subs[screen] || '';
}

function renderRow(row) {
  const tags = (row.tags||[]).map(t => `<span class="tag tag-${t}">${t==='dinner'?'Dîner':t==='lunch'?'Déj':t==='baths'?'Termes':'Résa'}</span>`).join('');
  const tagSpan = tags ? `<span class="tags">${tags}</span>` : '';
  const name = row.l
    ? `<a href="${row.l}" target="_blank" rel="noopener">${row.n}</a>${tagSpan}`
    : `${row.n}${tagSpan}`;
  const detail = row.d ? `<div class="row-detail">${row.d}</div>` : '';
  return `<div class="row"><div class="row-time">${row.t}</div><div class="row-body"><div class="row-name">${name}</div>${detail}</div></div>`;
}

function renderDayCard(day) {
  return day.sections.map(sec => `
    <div class="card">
      <div class="card-header">${sec.title}</div>
      ${sec.rows.map(renderRow).join('')}
    </div>
  `).join('');
}

                <div class="row-detail">${day.theme}</div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>`;
    return;
  }

  if (status === 'after') {
    el.innerHTML = `
      <div class="today-hero">
        <div class="today-date">Budapest · avril 2026</div>
        <h1>C'était magique 🥲</h1>
        <div class="today-theme">Zero regrets (sauf si vous avez sauté les thermes)</div>
      </div>
      <div class="today-body">
        <div class="pretrip-card">
          <h2>Le voyage est terminé</h2>
          <p>Budapest restera pour toujours dans nos cœurs.<br>À la prochaine aventure !</p>
          <button class="cta-btn" onclick="goTo('itinerary')">Revoir l'itinéraire 📅</button>
        </div>
      </div>`;
    return;
  }

  // During the trip
  const idx = getTodayDayIndex();
  if (idx < 0) return;
  const day = DAYS[idx];
  const dots = DAYS.map((d, i) => `<div class="progress-dot${i<=idx?' done':''}"></div>`).join('');

  el.innerHTML = `

      <h1>${day.emoji} ${day.title}</h1>
      <div class="today-theme">${day.theme}</div>
      <div class="today-progress">${dots}</div>
    </div>
    <div class="today-body">
      ${renderDayCard(day)}
    </div>`;
}

function renderItinerary() {
  const tabs = document.getElementById('day-tabs');

  tabs.innerHTML = DAYS.map((d, i) => `<button class="day-tab${i===0?' active':''}" id="tab-${i}" onclick="setDayTab(${i})">${d.emoji} ${d.label}</button>`).join('');
  panels.innerHTML = DAYS.map((d, i) => `
    <div class="day-content${i===0?' active':''}" id="panel-${i}">
      <div class="day-intro">
        <span class="pill">Jour ${d.num}</span>
        <h2>${d.emoji} ${d.title}</h2>
        <p>${d.theme}</p>

      ${renderDayCard(d)}

}

function setDayTab(i) {
  document.querySelectorAll('.day-tab').forEach((t,j) => t.classList.toggle('active', j===i));

  document.getElementById('screen-itinerary').scrollTo(0, 0);
}

// ─────────────────────────────────────────────
// PACKING SCREEN
// ─────────────────────────────────────────────

function packKey(person, section, item) {
  return `pack_${person}_${section}_${item.replace(/\s+/g,'_')}`;
}

function isChecked(item) {
  if (!currentPerson) return false;
  return localStorage.getItem(packKey(currentPerson, currentPackSection, item)) === '1';
}

function togglePack(item) {
  if (!currentPerson) return;
  const key = packKey(currentPerson, currentPackSection, item);
  const val = localStorage.getItem(key) === '1' ? '0' : '1';
  localStorage.setItem(key, val);
  renderPacking();
}

function setPackSection(section) {
  currentPackSection = section;
  document.querySelectorAll('.packing-tab').forEach(t => {
    t.classList.toggle('active', t.getAttribute('onclick').includes(`'${section}'`));
  });
  renderPacking();
}

function renderPacking() {
  const items = PACKING[currentPackSection];
  const checkedCount = items.filter(x => isChecked(x.item)).length;
  const pct = items.length ? Math.round(checkedCount / items.length * 100) : 0;
  document.getElementById('pack-progress-fill').style.width = pct + '%';
  document.getElementById('pack-progress-text').textContent = `${checkedCount} / ${items.length}`;

  // Group by category
  const byCat = {};
  items.forEach(x => { (byCat[x.cat] = byCat[x.cat]||[]).push(x); });

  document.getElementById('packing-body').innerHTML = Object.entries(byCat).map(([cat, catItems]) => `
    <div class="packing-section">
      <div class="packing-section-title">${cat}</div>
      <div class="packing-card">
        ${catItems.map(x => {
          const checked = isChecked(x.item);
          return `<div class="pack-item${checked?' checked':''}" onclick="togglePack('${x.item.replace(/'/g,"\\'")}')">
            <div class="pack-checkbox"></div>
            <div class="item-name">${x.item}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');

  // Update header sub
  if (currentScreen === 'packing') {
    document.getElementById('header-sub').textContent = currentPerson ? `Checklist de ${currentPerson}` : 'Checklist';
  }
}
