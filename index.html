
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#1a0810">
  <title>Budapest 2026 🇭🇺</title>
  <style>
    /* ── TOKENS ── */
    :root {
      --red:#C41230; --red-dim:rgba(196,18,48,.12); --green:#2A5C34; --gold:#C8922A;
      --bg:#F7F4EF; --card:#fff; --text:#1a1a1a; --muted:#888; --border:#ece6dc;
      --nav-h:64px; --safe-b:env(safe-area-inset-bottom,0px); --r:14px;
      --shadow:0 2px 14px rgba(0,0,0,.07);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5}

    /* ── SHELL ── */
    #app{display:flex;flex-direction:column;height:100dvh;position:relative}
    .screens{flex:1;position:relative;overflow:hidden}
    .screen{
      position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
      opacity:0;transform:translateY(18px);pointer-events:none;
      transition:opacity .22s ease-out,transform .25s ease-out;
      padding-bottom:calc(var(--nav-h) + var(--safe-b) + 4px);
    }
    .screen.active{opacity:1;transform:translateY(0);pointer-events:auto}
    .screen.exit{opacity:0;transform:translateY(-10px);transition:opacity .15s,transform .15s}

    /* ── ONBOARDING ── */
    #onboarding{
      position:fixed;inset:0;z-index:999;
      background:linear-gradient(160deg,#1a0810 0%,#4a1020 48%,#152a18 100%);
      display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:20px;padding:40px 32px;text-align:center;color:#fff;
      transition:opacity .4s;
    }
    #onboarding.out{opacity:0;pointer-events:none}
    #onboarding.hidden{display:none}
    #onboarding .ob-flag{font-size:56px;line-height:1}
    #onboarding h1{font-size:clamp(28px,8vw,42px);font-weight:200;letter-spacing:.18em;text-transform:uppercase}
    #onboarding p{font-size:15px;opacity:.65;line-height:1.7}
    .ob-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px;margin-top:4px}
    .ob-btn{
      padding:15px;border-radius:50px;border:1.5px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.07);color:#fff;font-size:15.5px;font-weight:500;
      cursor:pointer;transition:all .2s;letter-spacing:.02em;
    }
    .ob-btn:hover,.ob-btn:active{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.6)}

    /* ── HEADER ── */
    .app-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 16px 10px;background:var(--card);border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .hdr-title{font-size:17px;font-weight:700;line-height:1.2}
    .hdr-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
    .avatar{
      width:34px;height:34px;border-radius:50%;background:var(--red);color:#fff;
      font-size:13px;font-weight:700;border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav{
      position:fixed;bottom:0;left:0;right:0;
      height:calc(var(--nav-h) + var(--safe-b));
      background:var(--card);border-top:1px solid var(--border);
      display:flex;align-items:flex-start;padding-top:6px;z-index:100;
    }
    .nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
        background:none;border:none;cursor:pointer;padding:3px 0;
        color:var(--muted);font-size:10.5px;font-weight:500;transition:color .15s}
    .nb .ico{font-size:0;line-height:1;display:block;width:26px;height:26px;transition:transform .15s}
    .nb.active{color:var(--red)}
    .nb.active .ico{transform:scale(1.08)}

    /* ── SVG ICONS for nav ── */
    .ico svg{width:24px;height:24px;stroke-width:1.8;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}

    /* ── SHARED CARDS ── */
    .pad{padding:14px}
    .card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px}
    .card-hdr{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);padding:10px 14px;background:#fafaf8;border-bottom:1px solid var(--border)}
    .row{display:flex;padding:11px 14px;gap:12px;border-bottom:1px solid var(--border);align-items:flex-start;cursor:pointer;transition:background .12s}
    .row:last-child{border-bottom:none}
    .row:active,.row.tappable:hover{background:#f8f4ee}
    .rt{flex:0 0 46px;font-size:11.5px;color:var(--muted);padding-top:2px;font-variant-numeric:tabular-nums;line-height:1.35}
    .rb{flex:1;min-width:0}
    .rn{font-size:14px;font-weight:600;margin-bottom:2px;line-height:1.35}
    .rn a{color:var(--text);text-decoration:none;border-bottom:1.5px solid var(--gold);padding-bottom:1px}
    .rd{font-size:12px;color:var(--muted);line-height:1.45;max-height:0;overflow:hidden;opacity:0;transition:max-height .25s ease-out,opacity .2s ease-out,margin .2s}
    .row.open .rd{max-height:300px;opacity:1;margin-top:2px}
    .row-chev{font-size:9px;color:var(--muted);margin-top:5px;flex-shrink:0;transition:transform .2s;opacity:.5}
    .row.open .row-chev{transform:rotate(90deg);opacity:.8}
    .row-arrow{font-size:13px;color:var(--border);margin-top:1px;flex-shrink:0}
    .tags{display:inline-flex;gap:4px;margin-left:5px;vertical-align:middle}
    .tag{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 6px;border-radius:7px}
    .tag-d{background:#fff0f2;color:#c41230}
    .tag-l{background:#fff8e8;color:#9a6100}
    .tag-b{background:#eaf4ff;color:#1255a0}
    .tag-r{background:#edfbf2;color:#2a5c34;border:1px solid #a8d5b5}
    .pill{display:inline-block;background:var(--red);color:#fff;font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 11px;border-radius:20px}

    /* ── HERO SECTION (SVG illustrations) ── */
    .day-hero{position:relative;overflow:hidden;padding:28px 20px 22px;color:#fff;text-align:center}
    .day-hero svg.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .hero-content{position:relative;z-index:2}
    .hero-date{font-size:11px;opacity:.6;letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
    .hero-title{font-size:20px;font-weight:700;margin-bottom:3px;line-height:1.2}
    .hero-theme{font-size:12.5px;opacity:.7;font-style:italic}
    .hero-dots{display:flex;gap:6px;justify-content:center;margin-top:14px}
    .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25)}
    .dot.on{background:rgba(255,255,255,.9)}

    /* SVG gradients per day */
    .hero-d1{background:linear-gradient(160deg,#0d0820 0%,#1a0f2e 40%,#0d1f10 100%)}
    .hero-d2{background:linear-gradient(155deg,#2d1200 0%,#5c2a00 45%,#1a1000 100%)}
    .hero-d3{background:linear-gradient(155deg,#1a0a2e 0%,#3d1060 45%,#1a0820 100%)}
    .hero-d4{background:linear-gradient(155deg,#001020 0%,#002244 45%,#0a001a 100%)}
    .hero-d5{background:linear-gradient(155deg,#1a0808 0%,#400010 45%,#180818 100%)}
    .hero-pre{background:linear-gradient(160deg,#0a1830 0%,#1a0a2e 50%,#0a1010 100%)}

    /* ── TODAY ── */
    .today-body{padding:14px}
    .pretrip{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:24px 20px;text-align:center;margin-bottom:12px}
    .pretrip h2{font-size:19px;font-weight:700;margin-bottom:8px}
    .pretrip p{font-size:14px;color:var(--muted);margin-bottom:18px;line-height:1.65}
    .countdown{font-size:48px;font-weight:200;color:var(--red);margin:4px 0 8px;letter-spacing:-.02em}
    .cta{display:inline-block;background:var(--red);color:#fff;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:600;border:none;cursor:pointer;text-decoration:none;transition:opacity .15s}
    .cta:active{opacity:.8}
    .section-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin:16px 0 8px 2px}

    /* ── ITINERARY ── */
    .day-tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40}
    .day-tabs::-webkit-scrollbar{display:none}
    .day-tab{flex:0 0 auto;padding:10px 15px;font-size:12.5px;font-weight:500;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s}
    .day-tab.active{color:var(--red);border-bottom-color:var(--red)}
    .day-panel{display:none;padding:14px}
    .day-panel.active{display:block}
    .day-intro{margin-bottom:14px}
    .day-intro h2{font-size:19px;font-weight:700;margin:6px 0 3px}
    .day-intro p{font-size:13px;color:var(--muted);font-style:italic}

    /* ── PACKING ── */
    .pack-hdr{background:var(--card);border-bottom:1px solid var(--border);padding:10px 14px;position:sticky;top:0;z-index:40}
    .pack-type-tabs{display:flex;gap:8px;margin-bottom:10px}
    .ptab{flex:1;padding:8px;border-radius:10px;border:1.5px solid var(--border);background:none;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;text-align:center}
    .ptab.active{border-color:var(--red);background:var(--red-dim);color:var(--red)}
    .prog-bar-wrap{display:flex;align-items:center;gap:8px}
    .prog-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
    .prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s ease}
    .prog-txt{font-size:11px;color:var(--muted);white-space:nowrap;min-width:36px;text-align:right}
    .pack-body{padding:14px}
    .cat-label{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:16px 0 6px 2px}
    .cat-label:first-child{margin-top:0}
    .pack-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:4px}
    .pi{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;-webkit-user-select:none;user-select:none}
    .pi:last-child{border-bottom:none}
    .pi:active{background:#f5f0ea}
    .pi.checked .pi-name{text-decoration:line-through;color:var(--muted)}
    .pi-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .pi.checked .pi-check{background:var(--green);border-color:var(--green)}
    .pi-tick{display:none;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(42deg) translate(-1px,-1px)}
    .pi.checked .pi-tick{display:block}
    .pi-name{font-size:14px;flex:1;transition:color .2s}
    .pi-del{width:24px;height:24px;border:none;background:none;color:var(--muted);font-size:16px;cursor:pointer;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s;opacity:0}
    .pi:hover .pi-del,.pi:active .pi-del,.pi-del:focus{opacity:1}
    .pi-del:hover{color:#c41230;background:rgba(196,18,48,.08)}
    .pi-name[contenteditable]{outline:none;border-bottom:1px dashed var(--border);border-radius:0}
    .pi-name[contenteditable]:focus{border-color:var(--gold)}
    .pi-add-wrap{display:flex;gap:8px;padding:10px 14px;align-items:center}
    .pi-add-input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;background:var(--card);color:var(--text);outline:none;font-family:inherit}
    .pi-add-input:focus{border-color:var(--gold)}
    .pi-add-input::placeholder{color:var(--muted)}
    .pi-add-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--green);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s}
    .pi-add-btn:active{transform:scale(.92)}
    .pi-custom{background:rgba(200,146,42,.06)}
    .pi-cat{font-size:10px;color:var(--muted);background:var(--border);padding:2px 7px;border-radius:6px;flex-shrink:0}

    /* ── INFO ── */
    .info-body{padding:14px}
    .ic{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px}
    .ic-hdr{padding:14px 16px;font-size:15px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer}
    .ic-hdr .chev{margin-left:auto;color:var(--muted);font-size:13px;transition:transform .2s}
    .ic-hdr.open .chev{transform:rotate(180deg)}
    .ic-body{padding:14px 16px;display:none}
    .ic-body.open{display:block}
    .ir{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13.5px}
    .ir:last-child{border-bottom:none}
    .iv{font-weight:600;color:var(--red)}
    .callout{border-radius:10px;padding:11px 13px;font-size:13px;line-height:1.6;margin-bottom:8px}
    .cb{background:#e8f4ff;color:#1255a0}
    .cg{background:#edfbf2;color:#2a5c34}
    .cy{background:#fff8e8;color:#9a6100}
    .phrase{padding:9px 0;border-bottom:1px solid var(--border)}
    .phrase:last-child{border-bottom:none}
    .phr-fr{font-weight:600;font-size:13.5px;margin-bottom:2px}
    .phr-hu{color:var(--muted);font-style:italic;font-size:13px}
    .phr-pr{font-size:11.5px;color:#bbb}

    /* ── DETAIL SHEET ── */
    #det-back{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
    #det-back.show{opacity:1;pointer-events:auto}
    #det-sheet{
      position:fixed;bottom:0;left:0;right:0;background:var(--card);
      border-radius:22px 22px 0 0;max-height:82vh;overflow-y:auto;
      z-index:301;transform:translateY(100%);
      transition:transform .35s cubic-bezier(.32,0,.2,1);
      padding-bottom:calc(24px + var(--safe-b));
    }
    #det-sheet.show{transform:translateY(0)}
    .ds-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
    .ds-head{padding:16px 18px 0}
    .ds-type{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    .ds-title{font-size:20px;font-weight:700;line-height:1.2;margin-bottom:6px}
    .ds-desc{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:14px}
    .ds-section{padding:0 18px;margin-bottom:16px}
    .ds-section-title{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    .fact-list{list-style:none;display:flex;flex-direction:column;gap:6px}
    .fact-list li{font-size:13.5px;line-height:1.5;padding-left:16px;position:relative}
    .fact-list li::before{content:"→";position:absolute;left:0;color:var(--red);font-size:12px;top:1px}
    .stop-list{display:flex;flex-direction:column;gap:0}
    .stop{border-bottom:1px solid var(--border);padding:10px 0;display:flex;gap:10px;align-items:flex-start}
    .stop:last-child{border-bottom:none}
    .stop-num{width:22px;height:22px;border-radius:50%;background:var(--red);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
    .stop-body{}
    .stop-name{font-size:13.5px;font-weight:600;margin-bottom:2px}
    .stop-detail{font-size:12px;color:var(--muted)}
    .prac-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .prac-item{background:var(--bg);border-radius:10px;padding:10px 12px}
    .prac-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
    .prac-val{font-size:13.5px;font-weight:600}
    .ds-map-btn{display:block;margin:0 18px 0;padding:13px;background:var(--red);color:#fff;border-radius:12px;text-align:center;font-size:14px;font-weight:600;text-decoration:none;transition:opacity .15s}
    .ds-map-btn:active{opacity:.8}

    /* ── PHOTOS ── */
    .ds-photo{width:100%;height:200px;object-fit:cover;display:block;background:var(--border)}
    .row-thumb{width:44px;height:44px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--border);align-self:center}

    /* ── INSTA SCREEN ── */
    .insta-body{padding:14px}
    .insta-section-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin:20px 0 8px 2px}
    .insta-section-label:first-child{margin-top:4px}
    .insta-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:10px}
    .insta-card-photo{width:100%;height:170px;object-fit:cover;display:block;background:var(--border)}
    .insta-card-body{padding:12px 14px}
    .insta-card-name{font-size:15px;font-weight:700;margin-bottom:5px}
    .insta-card-tip{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:8px}
    .insta-card-meta{display:flex;flex-direction:column;gap:3px}
    .insta-card-time{font-size:12px;color:var(--gold);font-weight:600}
    .insta-card-tags{font-size:11.5px;color:#aaa}

    /* ── SUBROWS (walking tour toggles) ── */
    .sub-toggle{display:none}
    .srow-wrap{margin-top:6px;border-left:3px solid var(--red-dim);margin-left:2px;border-radius:0 0 8px 8px;overflow:hidden;display:none}
    .row.open .srow-wrap{display:block}
    .srow{display:flex;padding:8px 10px 8px 8px;gap:8px;border-bottom:1px solid var(--border);align-items:flex-start;cursor:default;transition:background .12s}
    .srow:last-child{border-bottom:none}
    .srow.tappable{cursor:pointer}
    .srow.tappable:active{background:#f8f4ee}
    .srow-num{width:18px;height:18px;border-radius:50%;background:var(--red);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
    .srow-body{flex:1;min-width:0}
    .srow-name{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:1px}
    .srow-detail{font-size:11.5px;color:var(--muted);line-height:1.4}

  </style>
</head>
<body>

<!-- ONBOARDING -->
<div id="onboarding">
  <svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg" width="160" height="144" style="margin-bottom:8px">
    <defs>
      <radialGradient id="gr" cx="40%" cy="35%"><stop offset="0%" stop-color="#e84060"/><stop offset="100%" stop-color="#C41230"/></radialGradient>
      <radialGradient id="gg" cx="40%" cy="35%"><stop offset="0%" stop-color="#3d7a48"/><stop offset="100%" stop-color="#2A5C34"/></radialGradient>
      <radialGradient id="go" cx="40%" cy="35%"><stop offset="0%" stop-color="#daa840"/><stop offset="100%" stop-color="#C8922A"/></radialGradient>
    </defs>
    <line x1="100" y1="32" x2="62"  y2="96" stroke="rgba(255,255,255,0.22)" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="100" y1="32" x2="138" y2="96" stroke="rgba(255,255,255,0.22)" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="62"  y1="96" x2="138" y2="96" stroke="rgba(255,255,255,0.22)" stroke-width="1.4" stroke-linecap="round"/>
    <circle cx="100" cy="32"  r="14" fill="url(#gr)"/>
    <circle cx="62"  cy="96"  r="14" fill="url(#gg)"/>
    <circle cx="138" cy="96"  r="14" fill="url(#go)"/>
    <circle cx="96"  cy="28"  r="4" fill="rgba(255,255,255,0.25)"/>
    <circle cx="58"  cy="92"  r="4" fill="rgba(255,255,255,0.2)"/>
    <circle cx="134" cy="92"  r="4" fill="rgba(255,255,255,0.2)"/>
    <text x="100" y="132" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="15" font-weight="600" letter-spacing="5" fill="#ffffff">BUDAPEST</text>

let currentPerson=null, currentScreen='today', currentPackSection='must', currentDayIdx=0;

function getTripStatus(){
  const now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const s=new Date(2026,3,20),e=new Date(2026,3,24);
  if(today<s)return'before'; if(today>e)return'after'; return'during';
}
function getTodayIdx(){
  const now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
  return DAYS.findIndex(d=>new Date(d.date).getTime()===today);
}
function getDaysLeft(){
  const now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  return Math.round((new Date(2026,3,20)-today)/(864e5));
}

function setPerson(name){
  currentPerson=name;

  const ob=document.getElementById('onboarding');
  ob.classList.add('out');
  setTimeout(()=>ob.classList.add('hidden'),420);

  document.getElementById('ob-p').textContent=t('date_sub')+'\n'+t('qui');
  renderAll();
}
function resetPerson(){
  if(confirm(t('qui')+' ?')){
    currentPerson=null;localStorage.removeItem('bp26_person');
    document.getElementById('avatar').textContent='?';
    document.getElementById('onboarding').classList.remove('hidden','out');
  }
}
function initPerson(){
  const s=localStorage.getItem('bp26_person');

}

// NAVIGATION (with transitions)
// ═══════════════════════════════════════════════
function goTo(screen){
  if(screen===currentScreen)return;
  const old=document.getElementById('screen-'+currentScreen);
  const next=document.getElementById('screen-'+screen);
  old.classList.add('exit');
  old.classList.remove('active');
  setTimeout(()=>{
    old.classList.remove('exit');
    next.classList.add('active');
    next.scrollTo(0,0);
  },160);
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('nb-'+screen).classList.add('active');
  currentScreen=screen;
  updateHeader();
}
function updateHeader(){
  const titles={today:'Budapest 🇭🇺',itinerary:t('itin'),packing:t('pack'),insta:t('insta_title'),info:t('info')};
  const subs={today:t('date_sub'),itinerary:t('days_sub'),packing:currentPerson?t('pack_sub')+' '+currentPerson:'',insta:t('insta_sub'),info:'Transport · Phrases · Shopping'};
  document.getElementById('hdr-title').textContent=titles[currentScreen]||'Budapest 🇭🇺';
  document.getElementById('hdr-sub').textContent=subs[currentScreen]||'';
  document.getElementById('nb-today-lbl').textContent=t('today');
  document.getElementById('nb-itin-lbl').textContent=t('itin');
  document.getElementById('nb-pack-lbl').textContent=t('pack');
  document.getElementById('nb-insta-lbl').textContent=t('insta');
  document.getElementById('nb-info-lbl').textContent=t('info');
}

// ROW RENDER
// ═══════════════════════════════════════════════
const TAGMAP={d:'tag-d',l:'tag-l',b:'tag-b',r:'tag-r'};
const TAGLBL={d:()=>t('td'),l:()=>t('tl'),b:()=>t('tb'),r:()=>t('tr')};
function tr_(obj){ if(!obj)return''; const lg=getLang(); return typeof obj==='object'?(obj[lg]||obj.fr||obj.en||''):obj; }
function toggleSub(id,ev){
  ev.stopPropagation();
  const w=document.getElementById('srows-'+id);
  const b=ev.currentTarget;
  if(w){w.classList.toggle('open');b.classList.toggle('open');}
}
function toggleRow(el,e){
  if(e.target.closest('a')||e.target.closest('.row-arrow'))return;
  el.classList.toggle('open');
}
function renderRow(row){
  const lang=getLang();
  const tags=(row.tags||[]).map(k=>`<span class="tag ${TAGMAP[k]}">${TAGLBL[k]()}</span>`).join('');
  const tagSpan=tags?`<span class="tags">${tags}</span>`:'';
  const detArrow=row.det?`<span class="row-arrow" onclick="event.stopPropagation();openDetail('${row.det.replace(/'/g,"\\'")}')" title="Details">›</span>`:'';
  const rowN=tr_(row.n);
  const rowL=typeof row.l==='string'?row.l:null;
  const name=rowL?`<a href="${rowL}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${rowN}</a>${tagSpan}`:`${rowN}${tagSpan}`;
  const rowD=tr_(row.d);
  const detail=rowD?`<div class="rd">${rowD}</div>`:'';
  const photo=row.det&&DETAILS[row.det]&&DETAILS[row.det].photo;
  const thumb=photo?`<img class="row-thumb" src="${photo}" loading="lazy" onerror="this.style.display='none'" alt="">`:'';
  const rowT=tr_(row.t);
  const hasContent=rowD||(row.subrows&&row.subrows.length);
  const chevron=hasContent?`<span class="row-chev">▸</span>`:'';
  let subHtml='';
  if(row.subrows&&row.subrows.length){
    const sid='sr'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
    const srowsHtml=row.subrows.map((s,i)=>{
      const sn=tr_(s.n); const sd=tr_(s.d)||'';
      const sl=s.l?`<a href="${s.l}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${sn}</a>`:sn;
      const sc=s.det?`onclick="openDetail('${s.det.replace(/'/g,"\\'")}')"`:'';
      return `<div class="srow${s.det?' tappable':''}" ${sc}><div class="srow-num">${i+1}</div><div class="srow-body"><div class="srow-name">${sl}</div>${sd?`<div class="srow-detail">${sd}</div>`:''}</div>${s.det?'<span class="row-arrow" style="font-size:11px;margin-top:2px">›</span>':''}</div>`;
    }).join('');
    subHtml=`<div class="srow-wrap" id="srows-${sid}">${srowsHtml}</div>`;
  }
  return `<div class="row" onclick="toggleRow(this,event)"><div class="rt">${rowT}</div>${thumb}<div class="rb"><div class="rn">${name}</div>${detail}${subHtml}</div>${chevron}${detArrow}</div>`;
}
function renderDayCards(day){
  const seenKeys=new Set();
  return day.sections.map(sec=>{
    const suffixStr=tr_(sec.suffix);
    const key=sec.title_key+'|'+suffixStr;
    if(seenKeys.has(key))return'';
    seenKeys.add(key);
    const allRows=day.sections.filter(s=>sec.title_key+tr_(s.suffix)===sec.title_key+suffixStr).flatMap(s=>s.rows);
    const hdr=`${t(sec.title_key)}${suffixStr?' · '+suffixStr:''}`;
    return `<div class="card"><div class="card-hdr">${hdr}</div>${allRows.map(r=>renderRow(r)).join('')}</div>`;
  }).join('');
}

function pkKey(id){return`bp26_${currentPerson}_${currentPackSection}_${id}`}
function isChk(id){return localStorage.getItem(pkKey(id))==='1'}
function togglePk(id,e){
  if(e)e.stopPropagation();
  const k=pkKey(id),v=localStorage.getItem(k)==='1'?'0':'1';
  localStorage.setItem(k,v);
  const el=document.querySelector(`[data-id="${CSS.escape(id)}"]`);
  if(el){el.classList.toggle('checked',v==='1');updatePackProgress();}
}
// ── Custom items per person+section stored in localStorage ──
function customKey(){return`bp26_${currentPerson}_${currentPackSection}_custom`}
function getCustomItems(){try{return JSON.parse(localStorage.getItem(customKey()))||[];}catch(e){return[];}}
function saveCustomItems(arr){localStorage.setItem(customKey(),JSON.stringify(arr));}
function addCustomItem(label,cat){
  if(!label.trim())return;
  const items=getCustomItems();
  const id='cust_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  items.push({id,cat,label:label.trim()});
  saveCustomItems(items);
  renderPacking();
}
function deletePackItem(id,e){
  if(e)e.stopPropagation();
  const items=getCustomItems().filter(x=>x.id!==id);
  saveCustomItems(items);
  localStorage.removeItem(pkKey(id));
  renderPacking();
}
function editPackItem(id,newLabel){
  const items=getCustomItems();
  const item=items.find(x=>x.id===id);
  if(item){item.label=newLabel.trim();saveCustomItems(items);}
}
function getAllPackItems(){
  const base=PACKING[currentPackSection]||[];
  const custom=getCustomItems();
  return [...base,...custom.map(c=>({id:c.id,cat:c.cat||{fr:'Perso',en:'Custom',pt:'Pessoal'},label:typeof c.label==='string'?{fr:c.label,en:c.label,pt:c.label}:c.label,custom:true}))];
}
function updatePackProgress(){
  const items=getAllPackItems();
  const cnt=items.filter(x=>isChk(x.id)).length;
  document.getElementById('prog-fill').style.width=Math.round(cnt/items.length*100)+'%';
  document.getElementById('prog-txt').textContent=`${cnt} / ${items.length}`;
}
function renderPacking(){
  const el=document.getElementById('screen-packing');
  const lang=getLang();
  const allItems=getAllPackItems();
  const byCat={};
  allItems.forEach(x=>{
    const catKey=tr_(x.cat);
    (byCat[catKey]=byCat[catKey]||[]).push(x);
  });
  const addLabel={fr:'Ajouter un item…',en:'Add an item…',pt:'Adicionar item…'}[lang]||'Add…';
  el.innerHTML=`
    <div class="pack-hdr">
      <div class="pack-type-tabs">
        <button class="ptab${currentPackSection==='must'?' active':''}" onclick="switchPackSection('must')">${t('must')}</button>
        <button class="ptab${currentPackSection==='nice'?' active':''}" onclick="switchPackSection('nice')">${t('nice')}</button>
      </div>
      <div class="prog-bar-wrap">
        <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
        <span class="prog-txt" id="prog-txt"></span>
      </div>
    </div>
    <div class="pack-body">
      ${Object.entries(byCat).map(([cat,items])=>`
        <div class="cat-label">${cat}</div>
        <div class="pack-card">
          ${items.map(x=>{
            const isCustom=!!x.custom;
            const lbl=tr_(x.label);
            const eid=CSS.escape(x.id);
            return `<div class="pi${isChk(x.id)?' checked':''}${isCustom?' pi-custom':''}" data-id="${x.id}">
              <div class="pi-check" onclick="togglePk('${x.id}',event)"><div class="pi-tick"></div></div>
              <div class="pi-name"${isCustom?` contenteditable="true" onblur="editPackItem('${x.id}',this.textContent)"`:` onclick="togglePk('${x.id}',event)"`}>${lbl}</div>
              ${isCustom?`<button class="pi-del" onclick="deletePackItem('${x.id}',event)" title="Supprimer">✕</button>`:''}
            </div>`;
          }).join('')}
        </div>`).join('')}
      <div class="pack-card" style="margin-top:8px">
        <div class="pi-add-wrap">
          <input class="pi-add-input" id="pack-add-input" placeholder="${addLabel}" onkeydown="if(event.key==='Enter'){document.getElementById('pack-add-btn').click();event.preventDefault();}">
          <button class="pi-add-btn" id="pack-add-btn" onclick="addCustomItem(document.getElementById('pack-add-input').value,{fr:'Perso',en:'Custom',pt:'Pessoal'})">+</button>
        </div>
      </div>
    </div>`;
  updatePackProgress();
}
function switchPackSection(s){currentPackSection=s;renderPacking();}

// ═══════════════════════════════════════════════
// DETAIL SHEET
// ═══════════════════════════════════════════════
function openDetail(key){
  const d=DETAILS[key]; if(!d)return;
  const lang=getLang();
  const back=document.getElementById('det-back');
  const sheet=document.getElementById('det-sheet');
  const typeLabels={
    en:{walking:'Walking Tour',landmark:'Landmark',baths:'Thermal Baths',cafe:'Café',bar:'Bar',park:'Park',market:'Market',memorial:'Memorial',cruise:'Cruise',hidden:'Hidden Gem',viewpoint:'Viewpoint','day-trip':'Day Trip'},
    fr:{walking:'Tour',landmark:'Monument',baths:'Thermes',cafe:'Café',bar:'Bar',park:'Parc',market:'Marché',memorial:'Mémorial',cruise:'Croisière',hidden:'Joyau caché',viewpoint:'Point de vue','day-trip':'Excursion'},
    pt:{walking:'Tour a Pé',landmark:'Ponto Turístico',baths:'Termas',cafe:'Café',bar:'Bar',park:'Parque',market:'Mercado',memorial:'Memorial',cruise:'Cruzeiro',hidden:'Joia Escondida',viewpoint:'Miradouro','day-trip':'Excursão'},
  };
  const prLabels={
    en:{price:'Price',duration:'Duration',hours:'Hours',type:'Type',tip:'Tip'},
    fr:{price:'Prix',duration:'Durée',hours:'Horaires',type:'Type',tip:'Astuce'},
    pt:{price:'Preço',duration:'Duração',hours:'Horários',type:'Tipo',tip:'Dica'},
  };
  const desc=lang==='en'&&d.desc_en?d.desc_en:lang==='pt'&&d.desc_pt?d.desc_pt:d.desc;
  const facts=lang==='en'&&d.facts_en?d.facts_en:lang==='pt'&&d.facts_pt?d.facts_pt:d.facts;
  const photoHTML=d.photo?`<img class="ds-photo" src="${d.photo}" alt="${key}" loading="lazy" onerror="this.style.display='none'">`:'';
  let html=`<div class="ds-handle"></div>
  ${photoHTML}
  <div class="ds-head">
    <div class="ds-type">${(typeLabels[lang]||typeLabels.fr)[d.type]||d.type}</div>
    <div class="ds-title">${key}</div>
    <div class="ds-desc">${desc}</div>
  </div>`;
  if(d.stops){
    const stopItems=d.stops.map((s,i)=>{
      const stopD=lang==='en'&&s.d_en?s.d_en:lang==='pt'&&s.d_pt?s.d_pt:(s.d_fr||s.d||'');
      return`<div class="stop"><div class="stop-num">${i+1}</div><div class="stop-body"><div class="stop-name">${s.n}</div><div class="stop-detail">${stopD}</div></div></div>`;
    }).join('');
    html+=`<div class="ds-section"><div class="ds-section-title">${t('stops')}</div>
    <div class="stop-list">${stopItems}</div></div>`;
  }
  if(facts){
    html+=`<div class="ds-section"><div class="ds-section-title">${t('facts')}</div>
    <ul class="fact-list">${facts.map(f=>`<li>${f}</li>`).join('')}</ul></div>`;
  }
  if(d.practical){
    const pl=prLabels[lang]||prLabels.fr;
    html+=`<div class="ds-section"><div class="ds-section-title">${t('practical')}</div>
    <div class="prac-grid">${Object.entries(d.practical).map(([k,v])=>`<div class="prac-item"><div class="prac-label">${pl[k]||k}</div><div class="prac-val">${tr_(v)}</div></div>`).join('')}</div></div>`;
  }
  if(d.map){
    html+=`<a href="${d.map}" target="_blank" class="ds-map-btn">${t('open_maps')}</a>`;
  }
  document.getElementById('det-content').innerHTML=html;
  back.classList.add('show');
  requestAnimationFrame(()=>requestAnimationFrame(()=>sheet.classList.add('show')));
}
function closeDetail(){
  document.getElementById('det-back').classList.remove('show');
  document.getElementById('det-sheet').classList.remove('show');
}

function renderInsta(){
  const el=document.getElementById('screen-insta');
  const lang=getLang();
  let html=`<div class="day-hero hero-pre">
    <svg class="bg" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice">
      ${[...Array(30)].map((_,i)=>`<circle cx="${5+i*13+Math.sin(i*2.1)*7}" cy="${10+Math.cos(i*1.6)*12}" r="${0.6+Math.sin(i)*0.5}" fill="white" opacity="${(0.1+Math.abs(Math.sin(i*0.8))*0.2).toFixed(2)}"/>`).join('')}
      <circle cx="200" cy="95" r="42" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
      <circle cx="200" cy="95" r="27" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1.5"/>
      <rect x="172" y="67" width="56" height="56" rx="14" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
      <circle cx="227" cy="79" r="4" fill="rgba(255,255,255,0.5)"/>
      <circle cx="200" cy="95" r="16" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    </svg>
    <div class="hero-content">
      <div class="hero-date">Budapest · avril 2026</div>
      <div class="hero-title">${t('insta_title')}</div>
      <div class="hero-theme">${t('insta_sub')}</div>
    </div>
  </div>
  <div class="insta-body">`;

  INSTA_SPOTS.forEach(group=>{
    html+=`<div class="insta-section-label">${t(group.key)}</div>`;
    group.items.forEach(item=>{
      const photoHTML=item.photo?`<img class="insta-card-photo" src="${item.photo}" alt="${item.name}" loading="lazy" onerror="this.style.display='none'">`:'';
      html+=`<div class="insta-card">
        ${photoHTML}
        <div class="insta-card-body">
          <div class="insta-card-name">${item.name}</div>
          <div class="insta-card-tip">${tr_(item.tip)}</div>
          <div class="insta-card-meta">
            <div class="insta-card-time">⏰ ${tr_(item.time)}</div>
            <div class="insta-card-tags">${item.tags}</div>
          </div>
        </div>
      </div>`;
    });
  });

  html+=`</div>`;
  el.innerHTML=html;
}
