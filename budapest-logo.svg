  <line x1="100" y1="32" x2="138" y2="96" stroke="#ddd" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="62"  y1="96" x2="138" y2="96" stroke="#ddd" stroke-width="1.4" stroke-linecap="round"/>

