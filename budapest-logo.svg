<svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg" width="200" height="180">
  <defs>
    <radialGradient id="gr" cx="40%" cy="35%"><stop offset="0%" stop-color="#e84060"/><stop offset="100%" stop-color="#C41230"/></radialGradient>
    <radialGradient id="gg" cx="40%" cy="35%"><stop offset="0%" stop-color="#3d7a48"/><stop offset="100%" stop-color="#2A5C34"/></radialGradient>
    <radialGradient id="go" cx="40%" cy="35%"><stop offset="0%" stop-color="#daa840"/><stop offset="100%" stop-color="#C8922A"/></radialGradient>
  </defs>

  <!-- connecting lines -->
