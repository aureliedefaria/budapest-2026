  <circle cx="96"  cy="28"  r="4" fill="rgba(255,255,255,0.25)"/>
  <circle cx="58"  cy="92"  r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="134" cy="92"  r="4" fill="rgba(255,255,255,0.2)"/>

